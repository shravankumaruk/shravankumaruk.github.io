<!DOCTYPE html>
<html>
<body>
<head>
  <title>Testing Web Worker by Shravan</title>
  <link rel="stylesheet" href="button-ka.css">
</head>
<p>Count numbers: <output id="result"></output></p><!--The <output> tag is used to represent the result of a calculation (like one performed by a script).-->
<button class="button-start" onclick="startWorker()">Start Worker</button> 
<button class="button-stop" onclick="stopWorker()">Stop Worker</button>

<p><strong>Note:</strong> Internet Explorer 9 and earlier versions do not support Web Workers.</p>

<script>
var w;

function startWorker() {
  if(typeof(Worker) !== "undefined") {
    if(typeof(w) == "undefined") {
      w = new Worker("shravan.js");
    }
    w.onmessage = function(event) {
      document.getElementById("result").innerHTML = event.data;
    };
  } else {
    document.getElementById("result").innerHTML = "Sorry, your browser does not support Web Workers...";
  }
}

function stopWorker() { 
  w.terminate();
  w = undefined;
}
</script>

</body>
</html>
